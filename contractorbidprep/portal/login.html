<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login — Contractors Bid Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <img src="../assets/logo.png" alt="Contractors Bid Prep" class="auth-logo"
           onerror="this.style.display='none'" />

      <!-- Success banner (shown after Stripe checkout) -->
      <div id="success-banner" style="display:none;background:#ECFDF5;border:1px solid #A7F3D0;
           border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;
           font-size:0.85rem;color:#065F46;text-align:center;">
        Subscription activated! Welcome aboard. Log in to access your dashboard.
      </div>

      <h1 class="auth-title">Client Portal</h1>
      <p class="auth-sub">Enter your access code to view your bid dashboard.</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="contractor-name">Your Name</label>
          <input
            class="form-input"
            type="text"
            id="contractor-name"
            placeholder="e.g. Dewayne"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="access-code">Access Code</label>
          <input
            class="form-input"
            type="password"
            id="access-code"
            placeholder="Enter your access code"
            autocomplete="current-password"
            required
          />
          <p class="form-error" id="login-error">Invalid name or access code. Please try again.</p>
        </div>

        <button type="submit" class="btn btn-gold btn-block" id="login-btn"
                style="margin-top:0.5rem;">
          Access Dashboard
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:0.82rem;color:#9CA3AF;">
        Don't have an account? <a href="https://tally.so/r/Gxkvvz" style="color:#C9A84C;font-weight:600;">Sign Up</a>
      </p>
      <p style="text-align:center;margin-top:0.5rem;font-size:0.82rem;color:#9CA3AF;">
        Need help? <a href="mailto:info@contractorbidprep.com" style="color:#C9A84C;">Email support</a>
      </p>

    </div>
  </div>

  <script>
    /* -------------------------------------------------------
       Simple access-code auth.
       In production: replace with a real auth system
       (Clerk, Auth0, Supabase, or a Vercel API route).
       For now, codes are stored client-side for seeding
       the initial client (Dewayne).
       ------------------------------------------------------- */

    const CLIENTS = {
      'dewayne': { code: 'cbp-2025', contractor: 'Dewayne' },
    };

    // Show success banner if coming from Stripe checkout
    const params = new URLSearchParams(window.location.search);
    if (params.get('checkout') === 'success') {
      document.getElementById('success-banner').style.display = 'block';
    }

    function handleLogin(e) {
      e.preventDefault();

      const name = document.getElementById('contractor-name').value.trim().toLowerCase();
      const code = document.getElementById('access-code').value.trim();
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errorEl.style.display = 'none';

      const client = CLIENTS[name];

      if (!client || client.code !== code) {
        errorEl.style.display = 'block';
        document.getElementById('access-code').value = '';
        return;
      }

      btn.textContent = 'Loading dashboard...';
      btn.disabled = true;

      // Store session
      sessionStorage.setItem('cbp_contractor', client.contractor);
      sessionStorage.setItem('cbp_auth', '1');

      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
